# Team / enterprise overrides for _bmad/config.toml.
# Committed to the repo — applies to every developer on the project.
# Tables deep-merge over base config; keyed entries merge by key.
# Example: override an agent descriptor, or add a new agent.
#
# [agents.bmad-agent-pm]
# description = "Prefers short, bulleted PRDs over narrative drafts."

# ─────────────────────────────────────────────────────────────────
# Path overrides — keep the entire BMAD footprint inside the
# gitignored _bmad-output/ tree (.gitignore ignores _bmad-output/).
# Installer defaults pointed at {project-root}/docs and
# {project-root}/skills, which are NOT gitignored and would be
# committed by accident. methodology-rules' real knowledge lives in
# .ai/ (synced via `pnpm ai:sync`) and is still read during the repo
# scan, so project_knowledge here is only BMAD's own output store.
# ─────────────────────────────────────────────────────────────────

[modules.bmm]
project_knowledge = "{project-root}/_bmad-output/project-knowledge"

[modules.bmb]
bmad_builder_output_folder = "{project-root}/_bmad-output/skills"
bmad_builder_reports = "{project-root}/_bmad-output/skills/reports"

[modules.tea]
test_artifacts = "{project-root}/_bmad-output/test-artifacts"
test_design_output = "_bmad-output/test-artifacts/test-design"
test_review_output = "_bmad-output/test-artifacts/test-reviews"
trace_output = "_bmad-output/test-artifacts/traceability"
