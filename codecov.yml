# Codecov configuration: coverage targets, PR comment layout, GitHub checks, and per-rule-processor flags.
# Flags are auto-uploaded by the "Upload flagged coverage per rule processor" CI step in backend-check.yaml.
# This file is generated by scripts/generate-rule-readmes.ts -- do not edit manually.

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "90...100"

  status:
    project:
      default:
        target: 100%
        threshold: 1%
    patch:
      default:
        target: 100%
        threshold: 1%

comment:
  layout: "condensed_header,condensed_files,condensed_footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  show_flags: true

github_checks:
  annotations: true

